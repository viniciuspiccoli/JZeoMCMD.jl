# ════════════════════════════════════════════════════════════════
# ZeoMCMD Force Field Parameters
# Single source of truth for both RASPA3 and LAMMPS
# ════════════════════════════════════════════════════════════════

[framework]
# Atom types in LAMMPS (after Ovito remap)
Si_type = 1
O_type  = 2
Al_type = 3   # set to 0 if pure silica
H_acid_type = 0

[framework.charges]
# Hill-Sauer bond increments (LAMMPS)
Si = 0.5236
O  = -0.2618

# Bai 2013 (RASPA3)
Si_raspa = 2.05
O_raspa  = -1.025
Al_raspa = 1.75

[framework.nonbonded]
# A/r^9 repulsion parameters (kcal/mol · Å^9)
A_Si = 186910.958224
A_O  = 57412.472881
A_Al = 186910.958224   # default = same as Si

[framework.bonded]
# Bond: class2  r0  K2  K3  K4
Si_O = [1.6104, 459.0786, -672.4445, 443.3651]

# Angles: class2  theta0  K2  K3  K4
Si_O_Si = [150.0, 20.7015, 27.5506, 10.9930]    # center = O
O_Si_O  = [113.0, 81.9691, -36.5814, 116.9558]   # center = Si

# Dihedral: class2  V1 phi1 V2 phi2 V3 phi3
O_Si_O_Si = [0.0306, 0.0, -0.0105, 0.0, 0.0804, 0.0]

[ethanol]
# TraPPE-UA model
atoms_per_mol = 4
atom_names = ["CH3", "CH2", "O_eth", "H_eth"]
types  = [3, 4, 5, 6]
charges = [0.0, 0.265, -0.700, 0.435]
masses  = [15.035, 14.027, 15.999, 1.008]

# LJ self-interactions (ε/kB in K, σ in Å)
[ethanol.lj]
CH3   = [98.0,  3.75]
CH2   = [46.0,  3.95]
O_eth = [93.0,  3.02]
H_eth = [0.0,   0.0]

# Bonds: r0(Å), K(K/Å²)  [RASPA3 harmonic convention]
[ethanol.bonds]
CH3_CH2   = [1.540, 50000.0]
CH2_O_eth = [1.430, 50000.0]
O_eth_H   = [0.945, 50000.0]

# Angles: theta0(°), K(K/rad²)
[ethanol.angles]
CH3_CH2_O   = [109.47, 50400.0]
CH2_O_H     = [108.50, 55400.0]

# Torsion: TRAPPE [c0, c1, c2, c3] in K
[ethanol.torsion]
CH3_CH2_O_H = [0.0, 209.82, -29.17, 187.93]

[pair_style]
cutoff = 12.0
coul_cutoff = 12.0
table_file_silica = "hillsauer_silica.table"
table_file_alumsil = "hillsauer_alumsil.table"
table_npoints = 2000
table_rmin = 1.0
table_rmax = 12.0

# Bai LJ for framework (ε/kB in K, σ in Å)
[pair_style.framework_lj]
Si = [22.0, 2.30]
O  = [53.0, 3.30]
